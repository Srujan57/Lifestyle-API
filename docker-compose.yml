services:
  backend:
    build:
      context: ./back-end
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      FLASK_DEBUG: "1"
      FRONTEND_URL: "http://localhost:3000"
      REDIRECT_URI: "http://localhost:5000/callback"
    volumes:
      - ./back-end:/app
    depends_on: []

  frontend:
    build:
      context: ./front-end
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: "http://localhost:5000"
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    volumes:
      - ./front-end:/app
      - /app/node_modules
    depends_on:
      - backend
